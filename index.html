<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convu -Let's Practice Conversation-</title>
    
    <script>
        // 🔑 Gemini APIキー自動組み込み済み
        const GEMINI_API_KEY = 'AQ.Ab8RN6IX1C4YkA5XGiPN7lNvPjdwSTmdjrOTefsddq3W1OVScA'; 
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* 🔳 全体デザイン：モノトーン ＆ 完全な直角 ＆ アクセントカラー#A0C8F0 */
        * { box-sizing: border-box; border-radius: 0 !important; -webkit-touch-callout: none; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #ffffff; color: #000000; padding: 20px; margin: 0; position: relative; user-select: none; -webkit-user-select: none; }
        .version-badge { position: absolute; top: 20px; right: 20px; font-family: 'Outfit', sans-serif; font-size: 11px; color: #a3a3a3; font-weight: 500; letter-spacing: 1px; }
        
        /* 🔳 ヘッダー：中央揃え・下線なし */
        .app-header { text-align: center; margin-bottom: 40px; max-width: 950px; margin: 10px auto 40px auto; }
        .main-brand { font-size: 46px; font-weight: 800; color: #A0C8F0; margin: 0; line-height: 1; letter-spacing: -0.5px; font-family: 'Outfit', sans-serif; }
        
        .app-container { display: flex; max-width: 950px; margin: 0 auto; gap: 30px; align-items: flex-start; }
        .left-panel { flex-shrink: 0; width: 240px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 🔳 キャラクター選択セクション（難易度テキスト削除） */
        .char-selector { background: #ffffff; padding: 15px; border: 1px solid #e5e5e5; }
        .char-selector-title { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; color: #000000; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #000000; padding-bottom: 4px; }
        
        .char-btn { font-family: 'Oswald', 'Noto Sans JP', sans-serif; width: 100%; background-color: #ffffff; color: #737373; border: 1px solid #e5e5e5; padding: 10px; margin-bottom: 8px; cursor: pointer; font-size: 16px; font-weight: 500; text-align: left; transition: 0.1s; }
        .char-btn:last-child { margin-bottom: 0; }
        .char-btn.selected { background-color: #A0C8F0; color: #000000; border-color: #A0C8F0; font-weight: 700; }
        
        /* 🔳 スピードセクション */
        .control-panel { background: #ffffff; padding: 15px; border: 1px solid #e5e5e5; }
        .button-column { display: flex; flex-direction: column; gap: 8px; }
        
        .s-btn { font-family: 'Oswald', 'Noto Sans JP', sans-serif; width: 100%; padding: 10px; font-size: 16px; border: 1px solid #e5e5e5; background: #ffffff; color: #000000; cursor: pointer; font-weight: 500; letter-spacing: 0.5px; text-align: center; transition: 0.1s; }
        .s-btn.active { background: #A0C8F0; color: #000000; border-color: #A0C8F0; font-weight: 700; }
        
        /* 🔳 メインコンテンツ */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        
        .status-card { background: #ffffff; padding: 15px; border: 1px solid #000000; text-align: left; position: relative; width: 100%; }
        .status-title { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700; color: #737373; letter-spacing: 1px; margin-bottom: 4px; }
        .status-text { font-size: 15px; font-weight: 700; color: #000000; min-height: 22px; padding-right: 100px; }
        
        .quit-btn { font-family: 'Oswald', sans-serif; position: absolute; top: 14px; right: 14px; background-color: #ffffff; color: #000000; border: 1px solid #000000; padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: 700; transition: 0.1s; }
        .quit-btn:hover { background-color: #000000; color: #ffffff; }
        
        .live-window { background: #ffffff; border: 1px dashed #a3a3a3; padding: 14px; font-size: 14px; min-height: 48px; text-align: center; color: #000000; width: 100%; }
        
        /* STARTボタン用コンテナ：縮小と中央配置 */
        .btn-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; width: 100%; }
        
        /* 🔳 START / HOLD ボタン：幅4分の1、ロゴと同色水色 */
        .talk-hold-btn { font-family: 'Oswald', sans-serif; background-color: #A0C8F0; color: #000000; border: 1px solid #A0C8F0; width: 25%; min-width: 140px; padding: 14px 0; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.1s; touch-action: none; -webkit-tap-highlight-color: transparent; letter-spacing: 1px; text-align: center; }
        .talk-hold-btn:active, .talk-hold-btn.recording { background-color: #dc2626 !important; border-color: #dc2626 !important; color: #ffffff !important; }
        .talk-hold-btn:disabled { background-color: #f5f5f5 !important; border-color: #e5e5e5 !important; color: #a3a3a3 !important; cursor: not-allowed; }

        /* 🔳 会話ウインドウ用ラッパー（AI Commentの位置決めの基準） */
        .history-wrapper { position: relative; width: 100%; margin-top: 10px; }
        
        /* 🔳 AI Comment ON / OFF： 会話ウインドウの右上に文字だけ配置 */
        .toggle-btn-text { position: absolute; top: -28px; right: 5px; font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; background: none; border: none; color: #a3a3a3; cursor: pointer; letter-spacing: 0.5px; padding: 0; transition: color 0.1s; }
        .toggle-btn-text.active { color: #A0C8F0; } /* ONの時はロゴと同じ水色 */

        /* 📋 コピーボタンもSTARTと同じスマートな横幅に統一 */
        .copy-btn { font-family: 'Oswald', 'Noto Sans JP', sans-serif; background-color: #ffffff; color: #000000; border: 1px solid #000000; width: 25%; min-width: 140px; padding: 10px 0; font-size: 14px; font-weight: 700; cursor: pointer; display: none; text-align: center; transition: 0.1s; }
        .copy-btn:hover { background-color: #f5f5f5; }
        
        /* 🔳 会話ウインドウ */
        .chat-history { height: 340px; background: #ffffff; border: 1px solid #e5e5e5; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .chat-bubble { max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.6; border: 1px solid #e5e5e5; }
        
        .chat-bubble.user { background-color: #f5f5f5; color: #000000; align-self: flex-end; border-right: 3px solid #A0C8F0; }
        .chat-bubble.ai { background-color: #ffffff; align-self: flex-start; border-left: 3px solid #000000; color: #000000; }
        .chat-bubble.ai .text-content { filter: blur(6px); transition: 0.2s; user-select: none; }
        .chat-bubble.ai.visible .text-content { filter: blur(0); user-select: text; }
    </style>
</head>
<body>

<div class="version-badge">Ver. 1.25</div>

<div class="app-header">
    <div class="main-brand">Convu</div>
</div>

<div class="app-container">
    <div class="left-panel">
        <div class="char-selector" id="char-area">
            <div class="char-selector-title">CHARACTER</div>
            <button class="char-btn selected" id="c1" onclick="selectCharacter(1)">Jun</button>
            <button class="char-btn" id="c4" onclick="selectCharacter(4)">Anna</button>
            <button class="char-btn" id="c5" onclick="selectCharacter(5)">Ms. Chen</button>
        </div>

        <div class="control-panel">
            <div class="char-selector-title" style="border:none; margin-bottom:8px;">SPEED</div>
            <div class="button-column">
                <button class="s-btn" id="rate-slow" onclick="setSpeed(0.6)">SLOW</button>
                <button class="s-btn active" id="rate-normal" onclick="setSpeed(0.85)">NORMAL</button>
                <button class="s-btn" id="rate-fast" onclick="setSpeed(1.1)">FAST</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="status-card">
            <div id="status-title" class="status-title">STATUS</div>
            <div id="status-text" class="status-text">Choose a character and press START!</div>
            <button id="quit-btn" class="quit-btn" style="display:none;" onclick="resetAppToBlank()">EXIT</button>
        </div>

        <div id="live-window" class="live-window">
            <span style="color:#a3a3a3;">Your speech will appear here...</span>
        </div>

        <div class="btn-container">
            <button id="hold-talk-btn" class="talk-hold-btn">START</button>
            <button id="copy-btn" class="copy-btn" onclick="copyConversation()">📋 COPY</button>
        </div>

        <div class="history-wrapper">
            <button class="toggle-btn-text" id="toggle-view" onclick="toggleAIText()">AI Comment ON / OFF</button>
            <div id="chat-history" class="chat-history"></div>
        </div>
    </div>
</div>

<script>
    let isAppRunning = false;
    let selectedCharId = 1; 
    let speechRate = 0.85; 
    let showAIText = false; 
    let recognition = null;
    let plainTextLog = [];
    let supportedVoices = [];
    let turnCount = 0; 
    let isRecordingNow = false;
    let finalSpeechResult = "";

    const characters = {
        1: { name: "Jun", gender: "male", voicePitch: 0.82, profile: "Jun, 15yo boy. Loves sports. Use 5-8 words. Junior high textbook words only." },
        4: { name: "Anna", gender: "female", voicePitch: 1.05, profile: "Anna, 15yo UK girl. Friendly. Use 10-12 words. Junior high textbook words only." },
        5: { name: "Ms. Chen", gender: "female", voicePitch: 0.98, profile: "Ms. Chen, Canada ALT. Helpful teacher. Use 15-20 words. Junior high textbook words only." }
    };

    const statusText = document.getElementById('status-text');
    const holdBtn = document.getElementById('hold-talk-btn');
    const historyContainer = document.getElementById('chat-history');
    const liveWindow = document.getElementById('live-window');
    const copyBtn = document.getElementById('copy-btn');
    const quitBtn = document.getElementById('quit-btn');

    function loadVoices() { supportedVoices = window.speechSynthesis.getVoices(); }
    loadVoices();
    if (window.speechSynthesis.onvoiceschanged !== undefined) { window.speechSynthesis.onvoiceschanged = loadVoices; }

    function setupPermanentRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { alert('Your browser does not support speech recognition.'); return; }
        
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onend = () => {
            if (isAppRunning) { recognition.start(); }
        };

        recognition.onresult = (event) => {
            if (!isRecordingNow) return; 

            let interim = '';
            let accumulated = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    accumulated += event.results[i][0].transcript + ' ';
                } else {
                    interim += event.results[i][0].transcript;
                }
            }
            if (accumulated) { finalSpeechResult += accumulated; }
            liveWindow.innerHTML = `<span>${finalSpeechResult}</span><span style="color:#a3a3a3;">${interim}</span>`;
        };

        recognition.onerror = (e) => { console.log('Speech recognition event error:', e.error); };
        recognition.start(); 
    }

    function setSpeed(rate) {
        speechRate = rate;
        document.querySelectorAll('.s-btn').forEach(btn => btn.classList.remove('active'));
        if(rate === 0.6) document.getElementById('rate-slow').classList.add('active');
        if(rate === 0.85) document.getElementById('rate-normal').classList.add('active');
        if(rate === 1.1) document.getElementById('rate-fast').classList.add('active');
    }

    function toggleAIText() {
        showAIText = !showAIText;
        const btn = document.getElementById('toggle-view');
        btn.classList.toggle('active', showAIText);
        document.querySelectorAll('.chat-bubble.ai').forEach(b => b.classList.toggle('visible', showAIText));
    }

    function selectCharacter(num) {
        if(isAppRunning) return;
        selectedCharId = num;
        document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('c' + num).classList.add('selected');
        statusText.innerText = `Talk to ${characters[selectedCharId].name}! Press START!`;
    }

    statusText.innerText = `Talk to ${characters[selectedCharId].name}! Press START!`;

    holdBtn.addEventListener('mousedown', (e) => { e.preventDefault(); onPressStart(); });
    holdBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onPressStart(); });
    holdBtn.addEventListener('mouseup', (e) => { e.preventDefault(); onPressEnd(); });
    holdBtn.addEventListener('mouseleave', (e) => { e.preventDefault(); onPressEnd(); });
    holdBtn.addEventListener('touchend', (e) => { e.preventDefault(); onPressEnd(); });
    holdBtn.addEventListener('contextmenu', (e) => { e.preventDefault(); });

    function onPressStart() {
        if (!isAppRunning) {
            isAppRunning = true;
            turnCount = 0;
            plainTextLog = [];
            historyContainer.innerHTML = '';
            copyBtn.style.display = 'none';
            quitBtn.style.display = 'inline-block';
            document.getElementById('char-area').style.pointerEvents = 'none';
            
            setupPermanentRecognition();
            readyForNextTurn();
            return;
        }
        if (holdBtn.disabled || isRecordingNow) return;
        
        isRecordingNow = true;
        finalSpeechResult = ""; 
        holdBtn.classList.add('recording');
        holdBtn.innerText = "LISTENING...";
        document.getElementById('status-title').innerText = 'YOUR TURN';
        statusText.innerText = "Keep holding and speak English!";
        liveWindow.innerHTML = 'Listening to your voice...';
    }

    function onPressEnd() {
        if (!isAppRunning || !isRecordingNow) return;
        isRecordingNow = false;
        holdBtn.classList.remove('recording');
        holdBtn.innerText = "HOLD TO SPEAK";
        holdBtn.disabled = true; 
        
        handleSpeechEnd();
    }

    function readyForNextTurn() {
        holdBtn.disabled = false;
        holdBtn.style.backgroundColor = '#000000';
        holdBtn.style.borderColor = '#000000';
        holdBtn.style.color = '#ffffff';
        holdBtn.innerText = "HOLD TO SPEAK";
        document.getElementById('status-title').innerText = 'READY';
        statusText.innerText = `Press and hold the button to talk to ${characters[selectedCharId].name}!`;
    }

    function cleanUpStudentSpeech(text) {
        let cleaned = text;
        cleaned = cleaned.replace(/\b(june|john|joan|gem)\b/gi, "Jun");
        cleaned = cleaned.replace(/\b(honor|ana|unner)\b/gi, "Anna");
        cleaned = cleaned.replace(/\b(chain|chen|chan|shane)\b/gi, "Chen");
        cleaned = cleaned.replace(/\b(study together|starting together|steady together)\b/gi, "study together");
        return cleaned;
    }

    async function handleSpeechEnd() {
        let studentSpeech = liveWindow.innerText.replace("Listening to your voice...", "").trim();
        studentSpeech = cleanUpStudentSpeech(studentSpeech);

        if(studentSpeech.length > 1) {
            turnCount++; 
            addChatBubble('user', studentSpeech);
            document.getElementById('status-title').innerText = 'THINKING...';
            statusText.innerText = `${characters[selectedCharId].name} is preparing a response...`;
            
            const aiReply = await askGemini(studentSpeech);
            
            document.getElementById('status-title').innerText = 'SPEAKING...';
            statusText.innerText = `Listen to ${characters[selectedCharId].name}!`;
            
            speak(aiReply, () => {
                addChatBubble('ai', aiReply);
                liveWindow.innerHTML = '<span style="color:#a3a3a3;">Your speech will appear here...</span>';
                
                if(turnCount >= 3) {
                    showConversationFinishState();
                } else {
                    readyForNextTurn();
                }
            });
        } else {
            readyForNextTurn();
        }
    }

    async function askGemini(promptText) {
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const currentChar = characters[selectedCharId];

        let levelRule = `Length: 8-15 words. Topic: React naturally to student's topic.`;
        let finalInstruction = "";
        if(turnCount >= 3) {
            finalInstruction = " This is last turn. Wrap up happily. (e.g. 'OK! Let's do that!').";
        }

        const systemRule = `Role: ${currentChar.profile}\n` +
                           `Turn: ${turnCount} of 3.${finalInstruction}\n` +
                           `Vocab: Basic Japanese junior high school textbook words only. NO slang. NO idioms.\n` +
                           `${levelRule}\n` +
                           `Language Rule: OUTPUT MUST BE 100% ENGLISH. DO NOT SPEAK JAPANESE AT ALL.\n` +
                           `Context Rule: Focus 100% on student's text. If their text makes no sense, do NOT agree. Ask them to clarify in simple English: "Sorry, I don't understand. What is that?"`;
                           
        const contents = [
            { role: 'user', parts: [{ text: `${systemRule}\n\nStudent: ${promptText}` }] }
        ];
        
        try {
            const res = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ contents }) 
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text.trim();
        } catch (e) { 
            console.log("Gemini Error:", e);
            return "Ah, I see! That sounds interesting."; 
        }
    }

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        const currentChar = characters[selectedCharId];
        if (supportedVoices.length === 0) { supportedVoices = window.speechSynthesis.getVoices(); }
        const englishVoices = supportedVoices.filter(v => v.lang.startsWith('en'));
        let selectedVoice = null;

        if (currentChar.gender === 'male') {
            selectedVoice = englishVoices.find(v => {
                const nameLower = v.name.toLowerCase();
                return nameLower.includes('male') || nameLower.includes('david') || nameLower.includes('cros') || nameLower.includes('natural') && nameLower.includes('man');
            });
            if (!selectedVoice && englishVoices.length > 1) { selectedVoice = englishVoices[1]; }
        } else {
            selectedVoice = englishVoices.find(v => {
                const nameLower = v.name.toLowerCase();
                return nameLower.includes('female') || nameLower.includes('zira') || nameLower.includes('google us english') || nameLower.includes('natural') && nameLower.includes('woman');
            });
            if (!selectedVoice && englishVoices.length > 0) { selectedVoice = englishVoices[0]; }
        }

        if (selectedVoice) { utterance.voice = selectedVoice; } else { utterance.lang = 'en-US'; }
        utterance.pitch = currentChar.voicePitch; 
        utterance.rate = speechRate;
        utterance.onend = callback;
        window.speechSynthesis.speak(utterance);
    }

    function addChatBubble(sender, text) {
        const bubble = document.createElement('div');
        bubble.classList.add('chat-bubble', sender);
        if(sender === 'ai') {
            const char = characters[selectedCharId];
            if(showAIText) bubble.classList.add('visible');
            bubble.innerHTML = `<b>${char.name}:</b> <span class="text-content">${text}</span>`;
            plainTextLog.push(`${char.name}: ${text}`);
        } else {
            bubble.innerHTML = `<b>You:</b> ${text}`;
            plainTextLog.push(`You: ${text}`);
        }
        historyContainer.appendChild(bubble);
        historyContainer.scrollTop = historyContainer.scrollHeight;
    }

    function copyConversation() {
        const textToCopy = plainTextLog.join('\n');
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "✅ COPIED!";
            setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
        }).catch(err => { alert('Copy failed.'); });
    }

    function showConversationFinishState() {
        isAppRunning = false;
        isRecordingNow = false;
        
        if(recognition) { 
            recognition.onend = null; 
            recognition.stop(); 
            recognition = null; 
        }
        
        holdBtn.disabled = false;
        holdBtn.classList.remove('recording');
        holdBtn.style.backgroundColor = '#A0C8F0';
        holdBtn.style.borderColor = '#A0C8F0';
        holdBtn.style.color = '#000000';
        holdBtn.innerText = "TRY AGAIN"; 
        
        document.getElementById('status-title').innerText = 'FINISH';
        statusText.innerText = 'Good job! See you next time! ✨';
        copyBtn.style.display = 'inline-block';
    }

    function resetAppToBlank() {
        isAppRunning = false;
        isRecordingNow = false;
        turnCount = 0;
        plainTextLog = []; 
        historyContainer.innerHTML = ''; 
        liveWindow.innerHTML = '<span style="color:#a3a3a3;">Your speech will appear here...</span>';
        
        if(recognition) { 
            recognition.onend = null;
            recognition.stop(); 
            recognition = null; 
        }
        window.speechSynthesis.cancel();
        
        quitBtn.style.display = 'none';
        holdBtn.disabled = false;
        holdBtn.classList.remove('recording');
        holdBtn.style.backgroundColor = '#A0C8F0';
        holdBtn.style.borderColor = '#A0C8F0';
        holdBtn.style.color = '#000000';
        holdBtn.innerText = "START";
        
        document.getElementById('status-title').innerText = 'STATUS';
        statusText.innerText = 'Conversation reset. Choose a character and press START!';
        copyBtn.style.display = 'none';
        document.getElementById('char-area').style.pointerEvents = 'auto';
    }
</script>
</body>
</html>
